<!DOCTYPE html>
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Finalizar Pedido · El Secreto de la Brasa</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#c8973c",
                        "background-light": "#f8f7f6",
                        "background-dark": "#1a1a1a",
                        "surface-dark": "#242424",
                    },
                    fontFamily: { "display": ["Epilogue", "sans-serif"] },
                },
            },
        }
    </script>
</head>

<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
    <div class="app-wrapper">
        <!-- Header -->
        <header
            class="sticky top-0 z-50 flex items-center justify-between bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md p-4 border-b border-primary/20">
            <a href="index.html"
                class="flex items-center justify-center size-10 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
                <span class="material-symbols-outlined text-slate-900 dark:text-slate-100">arrow_back</span>
            </a>
            <h1 class="text-xl font-black text-primary tracking-tight">Mi Pedido 🛒</h1>
            <div class="size-10"></div>
        </header>

        <main class="container py-8 px-4 space-y-8 max-w-2xl">

            <!-- Order Summary -->
            <section class="bg-surface-dark rounded-2xl p-6 border border-primary/20 shadow-2xl animate-in">
                <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">shopping_bag</span>
                    Resumen del Pedido
                </h2>
                <div class="space-y-4" id="orderItems">
                    <!-- Example Item -->
                    <div class="flex justify-between items-center border-b border-white/5 pb-4">
                        <div class="flex gap-4 items-center">
                            <div
                                class="size-12 rounded-lg bg-cover bg-center bg-[url('https://lh3.googleusercontent.com/aida-public/AB6AXuAiBMj45PWyimS18XQ-_588cyy6E2iCdXkDsC9l1Ww-zQ2985rep3BPYGhIENNhe0-LMEL77jEwTrszt7QCmA0rq5bXl-uYbLbmMN0gmuurU5SbKo8AzocwquOjzKmola_YbEotK366hdTz5mqm62-3ZsHPxVRcLnH4xGKSwI9vpLTEyEZ1hdIbpnr9KpPuTgkd194s7NHtqNrKbIwZQXU6z7iiE7MuhPI_0gCfjRRyUm9SSXWjaFCBqxQ2HtySarWw4ZabaVg4HEE')]">
                            </div>
                            <div>
                                <p class="font-bold">La Pistachera</p>
                                <p class="text-xs text-slate-500">Sin cebolla, Doble carne</p>
                            </div>
                        </div>
                        <span class="font-bold text-primary">19,40€</span>
                    </div>
                </div>
                <div class="flex justify-between items-center pt-6">
                    <span class="text-lg font-medium">Total</span>
                    <span class="text-2xl font-black text-primary">19,40€</span>
                </div>
            </section>

            <!-- Delivery Details -->
            <section class="space-y-4 animate-in" style="animation-delay: 0.1s">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary">location_on</span>
                    Detalles de Entrega
                </h2>
                <div class="grid gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold text-slate-500 uppercase px-1">Dirección de entrega</label>
                        <input
                            class="w-full bg-surface-dark border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-4 text-slate-100 placeholder:text-slate-600"
                            placeholder="Calle, número, piso..." type="text" />
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 uppercase px-1">Tu nombre</label>
                            <input
                                class="w-full bg-surface-dark border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-4 text-slate-100 placeholder:text-slate-600"
                                placeholder="Nombre completo" type="text" />
                        </div>
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-slate-500 uppercase px-1">Teléfono</label>
                            <input
                                class="w-full bg-surface-dark border-primary/20 focus:border-primary focus:ring-1 focus:ring-primary rounded-xl p-4 text-slate-100 placeholder:text-slate-600"
                                placeholder="600 000 000" type="tel" />
                        </div>
                    </div>
                </div>
            </section>

            <!-- Payment -->
            <section class="bg-primary/5 border border-primary/20 p-6 rounded-2xl animate-in"
                style="animation-delay: 0.2s">
                <div class="flex items-center gap-2 mb-4">
                    <span class="material-symbols-outlined text-primary">payments</span>
                    <h3 class="font-bold">Método de Pago</h3>
                </div>
                <div class="flex gap-4">
                    <button
                        class="flex-1 py-3 px-4 rounded-xl border-2 border-primary bg-primary/10 text-primary font-bold flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">payments</span> Efectivo
                    </button>
                    <button
                        class="flex-1 py-3 px-4 rounded-xl border border-white/10 bg-surface-dark text-slate-400 font-bold flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined">credit_card</span> Tarjeta
                    </button>
                </div>
            </section>

            <!-- CTA -->
            <section class="pt-4 pb-12 animate-in" style="animation-delay: 0.3s">
                <button onclick="window.location.href='confirmacion.html'"
                    class="w-full py-5 rounded-2xl bg-gradient-to-r from-primary to-[#8e6516] text-background-dark font-black text-xl shadow-2xl shadow-primary/30 flex items-center justify-center gap-3 active:scale-[0.98] transition-all hover:brightness-110">
                    🛵 Realizar Pedido
                </button>
                <p class="text-center text-xs text-slate-500 mt-4 italic flex items-center justify-center gap-2">
                    <span class="material-symbols-outlined text-sm">bolt</span>
                    Llegará en aproximadamente 25-35 min
                </p>
            </section>

        </main>

        <!-- Bottom Nav -->
        <nav
            class="fixed bottom-0 left-0 right-0 lg:left-auto lg:right-auto lg:w-[1200px] lg:mx-auto bg-surface-dark/95 backdrop-blur-md border-t border-primary/20 flex justify-around items-center px-4 py-3 z-[60]">
            <a class="flex flex-col items-center gap-1 text-slate-500" href="index.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-[10px] font-bold">INICIO</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-500" href="index.html#carta">
                <span class="material-symbols-outlined">menu_book</span>
                <span class="text-[10px] font-bold">CARTA</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-primary" href="resumen.html">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1">moped</span>
                <span class="text-[10px] font-bold">PEDIDO</span>
            </a>
            <a class="flex flex-col items-center gap-1 text-slate-500" href="confirmacion.html">
                <span class="material-symbols-outlined">person</span>
                <span class="text-[10px] font-bold">PERFIL</span>
            </a>
        </nav>
    </div>
</body>

</html>
